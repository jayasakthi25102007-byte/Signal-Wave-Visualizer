<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OSC-2000 Waveform Visualizer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0f0a; color: #00ff41; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; padding: 20px; }
  h1 { font-size: 2rem; letter-spacing: 6px; color: #00ff41; text-shadow: 0 0 20px #00ff41; margin-bottom: 5px; }
  .subtitle { font-size: 0.75rem; letter-spacing: 4px; color: #00aa2a; margin-bottom: 20px; }
  .screen-container { background: #050f05; border: 2px solid #00ff41; box-shadow: 0 0 30px #00ff4133; padding: 10px; margin-bottom: 20px; width: 720px; }
  .status-bar { font-size: 0.75rem; color: #00ff41; background: #0a1a0a; padding: 5px 10px; margin-bottom: 5px; border: 1px solid #00441a; }
  canvas { display: block; background: #050f05; }
  .controls { display: flex; gap: 20px; width: 720px; }
  .panel { background: #0a1a0a; border: 1px solid #00441a; padding: 15px; flex: 1; }
  .panel-title { font-size: 0.8rem; letter-spacing: 3px; color: #00ff41; margin-bottom: 12px; border-bottom: 1px solid #00441a; padding-bottom: 6px; }
  .wave-buttons { display: flex; gap: 8px; margin-bottom: 15px; }
  .wave-btn { background: transparent; border: 1px solid #00441a; color: #00aa2a; padding: 8px 16px; font-family: 'Courier New', monospace; font-size: 0.75rem; letter-spacing: 2px; cursor: pointer; transition: all 0.2s; }
  .wave-btn:hover { border-color: #00ff41; color: #00ff41; }
  .wave-btn.active { background: #00ff41; color: #000; border-color: #00ff41; }
  .readouts { display: flex; gap: 10px; }
  .readout { background: #050f05; border: 1px solid #00441a; padding: 10px; flex: 1; }
  .readout-label { font-size: 0.65rem; color: #00aa2a; letter-spacing: 2px; }
  .readout-value { font-size: 1.3rem; color: #00ff41; text-shadow: 0 0 10px #00ff41; }
  .slider-group { margin-bottom: 12px; }
  .slider-label { display: flex; justify-content: space-between; font-size: 0.7rem; letter-spacing: 2px; color: #00aa2a; margin-bottom: 5px; }
  .slider-value { color: #00ff41; }
  input[type=range] { width: 100%; accent-color: #00ff41; cursor: pointer; }
</style>
</head>
<body>
<h1>OSC-2000 WAVEFORM VISUALIZER</h1>
<p class="subtitle">PRECISION SIGNAL TRACING MODULE</p>

<div class="screen-container">
  <div class="status-bar" id="statusBar">CH1: SINE &nbsp;&nbsp; Vpp: 2.00V &nbsp;&nbsp; Freq: 1.0Hz</div>
  <canvas id="oscilloscope" width="700" height="350"></canvas>
</div>

<div class="controls">
  <div class="panel">
    <div class="panel-title">FUNCTION GENERATOR</div>
    <div class="wave-buttons">
      <button class="wave-btn active" onclick="setWave('SINE')">SINE</button>
      <button class="wave-btn" onclick="setWave('SQUARE')">SQUARE</button>
      <button class="wave-btn" onclick="setWave('TRI')">TRI</button>
      <button class="wave-btn" onclick="setWave('SAW')">SAW</button>
    </div>
    <div class="readouts">
      <div class="readout">
        <div class="readout-label">Period</div>
        <div class="readout-value" id="periodVal">1.000s</div>
      </div>
      <div class="readout">
        <div class="readout-label">V RMS</div>
        <div class="readout-value" id="rmsVal">0.71V</div>
      </div>
    </div>
  </div>

  <div class="panel">
    <div class="panel-title">PARAMETERS</div>
    <div class="slider-group">
      <div class="slider-label">AMPLITUDE <span class="slider-value" id="ampDisplay">1.00 V</span></div>
      <input type="range" id="ampSlider" min="1" max="50" value="10" oninput="updateParams()">
    </div>
    <div class="slider-group">
      <div class="slider-label">FREQUENCY <span class="slider-value" id="freqDisplay">1.0 Hz</span></div>
      <input type="range" id="freqSlider" min="1" max="100" value="10" oninput="updateParams()">
    </div>
    <div class="slider-group">
      <div class="slider-label">PHASE <span class="slider-value" id="phaseDisplay">0 deg</span></div>
      <input type="range" id="phaseSlider" min="0" max="360" value="0" oninput="updateParams()">
    </div>
  </div>
</div>

<script>
  const canvas = document.getElementById('oscilloscope');
  const ctx = canvas.getContext('2d');
  let waveType = 'SINE';
  let amplitude = 1.0;
  let frequency = 1.0;
  let phase = 0;
  let time = 0;

  function setWave(type) {
    waveType = type;
    document.querySelectorAll('.wave-btn').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
  }

  function updateParams() {
    amplitude = document.getElementById('ampSlider').value / 10;
    frequency = document.getElementById('freqSlider').value / 10;
    phase = document.getElementById('phaseSlider').value;
    document.getElementById('ampDisplay').textContent = amplitude.toFixed(2) + ' V';
    document.getElementById('freqDisplay').textContent = frequency.toFixed(1) + ' Hz';
    document.getElementById('phaseDisplay').textContent = phase + ' deg';
    document.getElementById('periodVal').textContent = (1 / frequency).toFixed(3) + 's';
    document.getElementById('rmsVal').textContent = (amplitude * 0.707).toFixed(2) + 'V';
    document.getElementById('statusBar').textContent =
      'CH1: ' + waveType + '   Vpp: ' + (amplitude * 2).toFixed(2) + 'V   Freq: ' + frequency.toFixed(1) + 'Hz';
  }

  function getWaveValue(t) {
    const p = phase * Math.PI / 180;
    const w = 2 * Math.PI * frequency * t + p;
    if (waveType === 'SINE') return Math.sin(w);
    if (waveType === 'SQUARE') return Math.sin(w) >= 0 ? 1 : -1;
    if (waveType === 'TRI') return (2 / Math.PI) * Math.asin(Math.sin(w));
    if (waveType === 'SAW') return (w % (2 * Math.PI)) / Math.PI - 1;
  }

  function drawGrid() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.strokeStyle = '#0d2e0d';
    ctx.lineWidth = 1;
    for (let x = 0; x <= canvas.width; x += 70) {
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
    }
    for (let y = 0; y <= canvas.height; y += 50) {
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
    }
    ctx.strokeStyle = '#1a4a1a';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(0, canvas.height / 2); ctx.lineTo(canvas.width, canvas.height / 2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(canvas.width / 2, 0); ctx.lineTo(canvas.width / 2, canvas.height); ctx.stroke();
  }

  function drawWave() {
    drawGrid();
    ctx.beginPath();
    ctx.strokeStyle = '#00ff41';
    ctx.lineWidth = 2.5;
    ctx.shadowColor = '#00ff41';
    ctx.shadowBlur = 8;
    const centerY = canvas.height / 2;
    const scaleY = (canvas.height / 2 - 20) * (amplitude / 5);
    for (let px = 0; px < canvas.width; px++) {
      const t = time + px / canvas.width / frequency * 2;
      const val = getWaveValue(t);
      const y = centerY - val * scaleY;
      px === 0 ? ctx.moveTo(px, y) : ctx.lineTo(px, y);
    }
    ctx.stroke();
    ctx.shadowBlur = 0;
    time += 0.005;
    requestAnimationFrame(drawWave);
  }

  updateParams();
  drawWave();
</script>
</body>
</html>
